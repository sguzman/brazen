# Brazen platform skeleton configuration.
# This file is intentionally comprehensive so future subsystems can turn into
# real behavior without renaming the config surface.

[app]
name = "Brazen"
tagline = "Capability Browser Platform"
homepage = "https://example.invalid/brazen"
mode = "dev"

[window]
initial_width = 1440.0
initial_height = 920.0
min_width = 960.0
min_height = 640.0
show_log_panel_on_startup = true
show_permission_panel_on_startup = false

[logging]
console_filter = "info,brazen=debug"
file_filter = "debug,brazen=trace"
file_name_prefix = "brazen.log"
ansi = true

[engine]
process_model = "single-process"
gfx_backend = "gl"
servo_source = ""
servo_source_tag = "v0.0.4"
servo_source_rev = "b73ae02"
# servo_resources_dir = "/path/to/servo/resources"
# certificate_path = "/path/to/ca-bundle.pem" # If unset, Brazen auto-detects common system bundles.
ignore_certificate_errors = true
startup_url = "https://example.com"
enable_multiprocess = false
new_window_policy = "same-tab"
verbose_logging = false
render_mode = "cpu-readback"
webrender_backend = "gl"
frame_pacing = "vsync"
pixel_format = "rgba8"
alpha_mode = "straight"
color_space = "srgb"
debug_bypass_swizzle = false
debug_capture_next_frame = false
debug_capture_dir = "logs"
debug_pixel_probe = false
debug_frame_probe = true
debug_pointer_overlay = false
devtools_enabled = false
devtools_transport = "none"
zoom_default = 1.0
zoom_min = 0.5
zoom_max = 3.0
zoom_step = 0.1
input_logging = false
security_warnings = true
profile_isolation = false
storage_policy = "profile-scoped"
service_worker_policy = "default"

[engine.resource_limits]
memory_mb = 2048
cpu_ms = 200
max_tabs = 32

[directories]
# Use "default" to resolve through platform-specific app data directories.
data_dir = "default"
logs_dir = "default"
profiles_dir = "default"
cache_dir = "default"
downloads_dir = "default"
crash_dumps_dir = "default"

[profiles]
active_profile = "default"

[cache]
capture_mode = "selective" # metadata-only | selective | archive | all
metadata_capture = true
selective_body_capture = true
archive_replay_mode = false
max_entry_bytes = 10485760
max_total_bytes = 0 # 0 disables total-size GC
gc_strategy = "none" # none | oldest
third_party_mode = "metadata-only"
storage_mode = "disk"
host_allowlist = []
host_denylist = []
mime_denylist = []
authenticated_only = false
capture_html_json_css_js = true
capture_media = true
gc_max_entries = 5000
dedupe_bodies = true
mime_allowlist = [
  "text/html",
  "application/json",
  "text/css",
  "application/javascript",
  "image/png",
]

[cache.host_overrides]
# "example.com" = { capture_mode = "all", capture_body = true, max_entry_bytes = 1048576 }

[permissions]
default = "ask"

[permissions.capabilities]
terminal-exec = "deny"
dom-read = "ask"
cache-read = "ask"
tab-inspect = "ask"
ai-tool-use = "ask"

[automation]
enabled = false
bind = "ws://127.0.0.1:7942"
expose_tab_api = true
expose_cache_api = false

[extraction]
article_processing_enabled = false
ontology_capture_enabled = false
rss_rehydration_enabled = false

[media]
default_tts_provider = "none"
auto_queue_reader_mode = false

[features]
shell_status_panel = true
cache_inspector = true
automation_server = false
servo_backend = false
